<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --accent-primary: #305CDE;
            --accent-secondary: #FFD700;
            --border-color: #E2E8F0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--bg-base);
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            border-top: 4px solid var(--accent-primary);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--accent-primary);
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        p.subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(48, 92, 222, 0.2);
        }
        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent-secondary);
            color: #0F172A;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { background-color: #E5C100; transform: translateY(-2px); }
        .message-box {
            text-align: center;
            padding: 1.5rem;
            border-radius: 8px;
        }
        .message-box h2 { margin-top: 0; margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif; }
        .success { background-color: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
        .error { background-color: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
        .hidden { display: none !important; }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script language="JavaScript">
        function isEmpty(str) { return (!str || 0 === str.trim().length); }

        function saveNewPassword() {
            var urlParams = new URLSearchParams(location.search);
            if (!urlParams.has('token') || isEmpty(urlParams.get('token'))) {
                alert("Missing the required Token");
                return;
            }

            var tokenValue = urlParams.get('token');
            var password_one = document.getElementById("password_one").value;
            var password_two = document.getElementById("password_two").value;

            if (isEmpty(password_one)) { alert("Password cannot be empty"); return; }
            if (password_one !== password_two) { alert("Passwords do not match"); return; }

            var $btn = $("#submitBtn");
            $btn.prop("disabled", true).text("Saving...");

            $.ajaxSetup({ "contentType": "application/json" });
            var dataPayload = {"token": tokenValue, "password": password_one};

            $.post('http://ec2-63-182-150-7.eu-central-1.compute.amazonaws.com:8080/smarty-commerce/users/password-reset', JSON.stringify(dataPayload))
                .done(function (response) {
                    $("#resetForm").addClass("hidden");
                    if (response["operationResult"] === "SUCCESS") {
                        $("#successful-result").removeClass("hidden");
                    } else {
                        $("#not-successful-result").removeClass("hidden");
                    }
                })
                .fail(function() {
                    $("#resetForm").addClass("hidden");
                    $("#not-successful-result").removeClass("hidden");
                });
        }
    </script>
</head>
<body>

<div class="container">
    <div id="resetForm">
        <h1>Reset Password</h1>
        <p class="subtitle">Please enter your new password below.</p>
        
        <div class="input-group">
            <label for="password_one">New Password</label>
            <input type="password" id="password_one" placeholder="Enter new password" />
        </div>
        
        <div class="input-group">
            <label for="password_two">Retype New Password</label>
            <input type="password" id="password_two" placeholder="Confirm new password" />
        </div>
        
        <button id="submitBtn" class="btn" onclick="javascript:saveNewPassword()">Save New Password</button>
    </div>

    <div id="successful-result" class="message-box success hidden">
        <h2>Success!</h2>
        <p>Your password is now updated.</p>
        <a href="http://ec2-63-182-150-7.eu-central-1.compute.amazonaws.com:3000/login" class="btn" style="margin-top: 1rem; text-decoration: none; display: inline-block; width: auto;">Go to Login</a>
    </div>
    
    <div id="not-successful-result" class="message-box error hidden">
        <h2>Error</h2>
        <p>Could not update password. The link might be expired.</p>
    </div>
</div>

</body>
</html>
